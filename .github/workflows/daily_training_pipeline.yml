name: Daily Model Training & Prediction

on:
  schedule:
    - cron: '0 1 * * *'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

jobs:
  train-and-predict:
    runs-on: ubuntu-latest

    permissions:
      contents: write
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        #cache: 'pip'
        
    - name: Install dependencies
      run: |
        pip install --upgrade pip
        pip install -r requirements.txt

    - name: Train models
      env:
        HOPSWORKS_API_KEY: ${{ secrets.HOPSWORKS_API_KEY }}
        HOPSWORKS_PROJECT_NAME: ${{ secrets.HOPSWORKS_PROJECT_NAME }}
        HOPSWORKS_HOST: ${{ secrets.HOPSWORKS_HOST }}
      run: |
        python src/models/daily_training.py
        
    - name: Generate predictions
      env:
        HOPSWORKS_API_KEY: ${{ secrets.HOPSWORKS_API_KEY }}
        HOPSWORKS_PROJECT_NAME: ${{ secrets.HOPSWORKS_PROJECT_NAME }}
        HOPSWORKS_HOST: ${{ secrets.HOPSWORKS_HOST }}
      run: |
        python src/prediction/predictor.py
        
    - name: Commit predictions
      run: |
        git config --local user.email "saqibahmad2004@gmail.com"
        git config --local user.name "saqibahmadsiddiqui"

        cp data/processed/latest_predictions.csv /tmp/latest_predictions.csv
        cp data/processed/model_comparison.csv /tmp/model_comparison.csv

        for i in 1 2 3 4 5; do
          git fetch origin main
          git reset --hard origin/main
          cp /tmp/latest_predictions.csv data/processed/latest_predictions.csv
          cp /tmp/model_comparison.csv data/processed/model_comparison.csv
          git add data/processed/latest_predictions.csv data/processed/model_comparison.csv
          if git diff --staged --quiet; then
            echo "No changes to commit"
            break
          fi
          git commit -m "Update predictions $(date +'%Y-%m-%d')"
          if git push origin main; then
            echo "Pushed successfully"
            break
          fi
          echo "Push rejected, retrying ($i)..."
          sleep $((RANDOM % 10 + 5))
        done